<!DOCTYPE html>
<html data-p100-theme="prime-light" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>SIXT Share — Animation: crossing zone borders</title>
  <link rel="stylesheet" href="colors_and_type.css"/>
  <style>
    html, body { margin:0; background:#f0eee9; }
    body { font-family:"Helvetica Now Text", system-ui, sans-serif; min-height:100vh;
      display:flex; align-items:center; justify-content:center; padding:24px; box-sizing:border-box; }
    button { font-family:inherit; }
    #root { display:flex; align-items:center; justify-content:center; }
  </style>
</head>
<body>
  <template id="__bundler_thumbnail" data-bg-color="#f0eee9">
    <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
      <rect width="1200" height="800" fill="#f0eee9"/>
      <g transform="translate(220 140)">
        <rect width="760" height="520" rx="56" fill="#1A1A1A"/>
        <rect x="40" y="40" width="680" height="440" rx="28" fill="#e8eaed"/>
        <path d="M120 320 L380 240 L600 280 L640 460 L260 480 Z" fill="rgba(34,197,94,0.30)" stroke="#22C55E" stroke-width="6"/>
        <path d="M380 100 L640 120 L660 240 L420 250 Z" fill="rgba(0,136,255,0.30)" stroke="#0088FF" stroke-width="6"/>
        <circle cx="430" cy="290" r="60" fill="rgba(255,80,0,0.20)"/>
        <circle cx="430" cy="290" r="26" fill="#FF5000" stroke="#fff" stroke-width="8"/>
      </g>
      <text x="600" y="730" text-anchor="middle" font-family="system-ui" font-weight="900" font-size="28" fill="#1A1A1A" letter-spacing="2">CROSSING ZONE BORDERS</text>
    </svg>
  </template>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="map-background.js"></script>
  <script type="text/babel" src="app-chrome.jsx"></script>
  <script type="text/babel" src="zone-system.jsx"></script>
  <script type="text/babel" src="driving-screen.jsx"></script>
  <script type="text/babel" src="zone-transition-animation.jsx"></script>

  <script type="text/babel">
    function Mount(){
      const [scale, setScale] = React.useState(1);
      const STAGE_W = 414;   /* phone 390 + padding */
      const STAGE_H = 1020;  /* phone 844 + scrubber + gap */
      React.useEffect(() => {
        const compute = () => {
          const vw = window.innerWidth - 48;
          const vh = window.innerHeight - 48;
          setScale(Math.min(1, vw/STAGE_W, vh/STAGE_H));
        };
        compute();
        window.addEventListener('resize', compute);
        return () => window.removeEventListener('resize', compute);
      }, []);
      return (
        <div style={{ width: STAGE_W, height: STAGE_H,
          transform:`scale(${scale})`, transformOrigin:'center center',
          display:'flex', alignItems:'center', justifyContent:'center' }}>
          <ZoneTransitionAnimation rewardColor="#22C55E" chargeColor="#0088FF"/>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Mount/>);
  </script>
</body>
</html>
